<!DOCTYPE html>
<html lang="en">
<head>
    <title>Morrowind Class Quiz</title>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
        }

        button, img {
            margin-left: auto;
            margin-right: auto;
            display: block;
        }

        button {
            max-width: 820px;
            width: calc(100% - 40px);
            padding: 10px 14px;
            margin-top: 8px;
            white-space: normal;
            cursor: pointer;
        }

        h2, h3, p {
            color: white;
            text-align: center;
        }

        #top-padding {
            height: 120px;
        }

        #quiz-question {
            display: none;
            max-width: 900px;
            margin: 0 auto;
        }

        #question-count {
            margin-bottom: 20px;
            color: #bfbfbf;
        }

        #question-prompt {
            max-width: 860px;
            margin: 0 auto 16px auto;
            line-height: 1.5;
        }

        #answer-buttons {
            margin-top: 10px;
        }

        #answer-buttons button {
            text-align: left;
        }

        #answer-buttons .answer-label {
            font-weight: bold;
            margin-right: 8px;
        }

        #result-extra {
            max-width: 860px;
            margin: 16px auto 0 auto;
            color: #bfbfbf;
            line-height: 1.4;
        }
    </style>

    <script src="jquery.min.js"></script>
</head>
<body>
<div id="top-padding"></div>

<div id="audio-message">
    <h2>This application is mainly audio. Please have audio enabled and set to a reasonable volume.</h2>
</div>
<button id="button-1" onclick="playAudio1()">Climb up to the boat deck</button>
<button id="button-2" style="display: none;" onclick="playAudio2()">Walk off the boat</button>
<button id="button-3" style="display: none;" onclick="playAudio3()">Pick your race</button>
<button id="button-4" style="display: none;" onclick="playAudio4()">Enter the census office</button>
<button id="button-5" style="display: none;" onclick="playAudio5()">Take the class quiz</button>

<div id="quiz-question">
    <p id="question-count"></p>
    <p id="question-prompt"></p>
    <div id="answer-buttons"></div>
</div>

<div id="quiz-result" style="display: none;">
    <h3>You are a: <span id="class-name"></span></h3>
    <img id="class-image" src="" alt="Class image">
    <p id="class-description"></p>
    <p id="result-extra">Your selected answers are also stored in your browser under local storage key <code style="color: white;">morrowindQuizState</code>.</p>
    <br>
    <button onclick="restartQuiz()">Restart quiz</button>
</div>
</body>

<script>
    const quizQuestions = [
        {
            prompt: "On a clear day you chance upon a strange animal, its leg trapped in a hunter's clawsnare. Judging from the bleeding it will not survive long.",
            answers: [
                { label: "A", text: "Draw your dagger, mercifully ending its life with a single thrust.", score: "combat" },
                { label: "B", text: "Use herbs from your pack to put it to sleep.", score: "magic" },
                { label: "C", text: "Leave it to its fate. Do not interfere.", score: "stealth" },
                { label: "D", text: "Stay with the creature and try to comfort it in its final moments; no living thing should die alone.", score: "magic" },
                { label: "E", text: "Learn as much as you can from this. Study the creature, the snare, its injuries, everything you can.", score: "magic" }
            ]
        },
        {
            prompt: "One Summer afternoon your father gives you a choice of chores.",
            answers: [
                { label: "A", text: "Work in the forge with him casting iron for a new plow.", score: "combat" },
                { label: "B", text: "Gather herbs for your mother who is preparing dinner.", score: "magic" },
                { label: "C", text: "Go catch fish at the stream using a net and line.", score: "stealth" },
                { label: "D", text: "Take a sack of grain to the mill and bring back flour before supper.", score: "combat" },
                { label: "E", text: "Scrub the cooking pots, sweep the floor, and clean the kitchen before your mother returns.", score: "magic" }
            ]
        },
        {
            prompt: "Your cousin has given you a very embarrassing nickname and, even worse, likes to call you it in front of your friends. You asked him to stop, but he finds it very amusing to watch you blush.",
            answers: [
                { label: "A", text: "Beat up your cousin, then tell him that if he ever calls you that nickname again, you will bloody him worse than this time.", score: "combat" },
                { label: "B", text: "Make up a story that makes your nickname a badge of honor instead of something humiliating.", score: "magic" },
                { label: "C", text: "Make up an even more embarrassing nickname for him and use it constantly until he learns his lesson.", score: "stealth" },
                { label: "D", text: "Challenge your cousin to a race, wrestling match, or contest, intending to settle the matter through competition.", score: "combat" },
                { label: "E", text: "Win over your friends so thoroughly that when your cousin uses the nickname, they dismiss him instead of laughing with him.", score: "stealth" }
            ]
        },
        {
            prompt: "There is a lot of heated discussion at the local tavern over a group of people called 'Telepaths'. They have been hired by certain City-State kings. Rumor has it these Telepaths read a person's mind and tell their lord whether a follower is telling the truth or not.",
            answers: [
                { label: "A", text: "This is a terrible practice. A person's thoughts are his own and no one, not even a king, has the right to make such an invasion into another person's mind.", score: "combat" },
                { label: "B", text: "Loyal followers to the king have nothing to fear from a Telepath. It is important to have a method of finding assassins and spies before it is too late.", score: "magic" },
                { label: "C", text: "In these times, it is a necessary evil. Although you do not necessarily like the idea, a Telepath could have certain advantages during a time of war or in finding someone innocent of a crime.", score: "stealth" },
                { label: "D", text: "The rumors are likely exaggerated. People fear Telepaths most because they do not understand them.", score: "magic" },
                { label: "E", text: "Learn how the Telepaths' system works, then look for clever ways to evade it and turn that knowledge to your advantage.", score: "stealth" }
            ]
        },
        {
            prompt: "Your mother sends you to the market with a list of goods to buy. After you finish you find that by mistake a shopkeeper has given you too much money back in exchange for one of the items.",
            answers: [
                { label: "A", text: "Return to the store and give the shopkeeper his hard-earned money, explaining to him the mistake.", score: "combat" },
                { label: "B", text: "Decide to put the extra money to good use and purchase items that would help your family.", score: "magic" },
                { label: "C", text: "Pocket the extra money, knowing that shopkeepers in general tend to overcharge customers anyway.", score: "stealth" },
                { label: "D", text: "Slip the extra money back onto the merchant's counter or into the till without saying a word, avoiding thanks or attention.", score: "stealth" },
                { label: "E", text: "Share the extra money with a beggar or hungry child nearby.", score: "magic" }
            ]
        },
        {
            prompt: "While in the market place you witness a thief cut a purse from a noble. Even as he does so, the noble notices and calls for the city guards. In his haste to get away, the thief drops the purse near you. Surprisingly no one seems to notice the bag of coins at your feet.",
            answers: [
                { label: "A", text: "Pick up the bag and signal to the guard, knowing that the only honorable thing to do is return the money to its rightful owner.", score: "combat" },
                { label: "B", text: "Leave the bag there, knowing that it is better not to get involved.", score: "magic" },
                { label: "C", text: "Pick up the bag and pocket it, knowing that the extra windfall will help your family in times of trouble.", score: "stealth" },
                { label: "D", text: "Quietly pick up the purse and chase after the thief, admiring the skill of the cut and wanting to see how the situation ends.", score: "stealth" },
                { label: "E", text: "Pick up the purse and run after the guards, eager to be part of the chase and the excitement.", score: "combat" }
            ]
        },
        {
            prompt: "Your father sends you on a task which you loathe, cleaning the stables. On the way there, pitchfork in hand, you run into your friend from the homestead near your own. He offers to do it for you, in return for a future favor of his choosing.",
            answers: [
                { label: "A", text: "Decline his offer, knowing that your father expects you to do the work, and it is better not to be in debt.", score: "combat" },
                { label: "B", text: "Ask him to help you, knowing that two people can do the job faster than one, and agree to help him with one task of his choosing in the future.", score: "magic" },
                { label: "C", text: "Accept his offer, reasoning that as long as the stables are cleaned, it matters not who does the cleaning.", score: "stealth" },
                { label: "D", text: "Shrug off the chore for now and go off to play with your friend, deciding the stables can wait until later.", score: "stealth" },
                { label: "E", text: "Persuade a few children to do the work, turning the hated chore into a small enterprise.", score: "stealth" }
            ]
        },
        {
            prompt: "Your mother asks you to help fix the stove. While you are working, a very hot pipe slips its mooring and falls towards her.",
            answers: [
                { label: "A", text: "Position yourself between the pipe and your mother.", score: "combat" },
                { label: "B", text: "Grab the hot pipe and try to push it away.", score: "magic" },
                { label: "C", text: "Push your mother out of the way.", score: "stealth" },
                { label: "D", text: "Shout a warning to your mother and leap back, trusting her to react in time.", score: "magic" },
                { label: "E", text: "Freeze in place and do nothing until the moment has already passed.", score: "stealth" }
            ]
        },
        {
            prompt: "While in town the baker gives you a sweetroll. Delighted, you take it into an alley to enjoy only to be intercepted by a gang of three other kids your age. The leader demands the sweetroll, or else he and his friends will beat you and take it.",
            answers: [
                { label: "A", text: "Drop the sweetroll and step on it, then get ready for the fight.", score: "combat" },
                { label: "B", text: "Give him the sweetroll now without argument, knowing that later this afternoon you will have all your friends with you and can come and take whatever he owes you.", score: "magic" },
                { label: "C", text: "Act like you're going to give him the sweetroll, but at the last minute throw it in the air, hoping that they'll pay attention to it long enough for you to get a shot in on the leader.", score: "stealth" },
                { label: "D", text: "Hand over the sweetroll, but memorize the leader's face and mannerisms so you can settle things properly another day.", score: "stealth" },
                { label: "E", text: "Offer the sweetroll to the smallest or quietest of the three, trying to divide the gang against itself.", score: "magic" }
            ]
        },
        {
            prompt: "Entering town you find that you are witness to a very well-dressed man running from a crowd. He screams to you for help. The crowd behind him seem very angry.",
            answers: [
                { label: "A", text: "Rush to the town's aid immediately, despite your lack of knowledge of the circumstances.", score: "combat" },
                { label: "B", text: "Stand aside and allow the man and the mob to pass, realizing it is probably best not to get involved.", score: "magic" },
                { label: "C", text: "Rush to the man's aid immediately, despite your lack of knowledge of the circumstances.", score: "stealth" },
                { label: "D", text: "Turn to the crowd and try to calm them, believing anger should be answered with reason before blood is spilled.", score: "magic" },
                { label: "E", text: "Knock the man to the ground yourself and hold him there until the truth of the matter can be sorted out.", score: "combat" }
            ]
        }
    ];

    let currentQuestion = 1;
    let combatCount = 0;
    let magicCount = 0;
    let stealthCount = 0;
    let recordedAnswers = [];

    const STORAGE_KEY = 'morrowindQuizState';

    const persistQuizState = () => {
        const state = {
            currentQuestion,
            combatCount,
            magicCount,
            stealthCount,
            resultClass: className || null,
            recordedAnswers
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    };

    const resetStoredQuizState = () => {
        localStorage.removeItem(STORAGE_KEY);
    };

    const incrementCombat = () => {
        combatCount++;
    };
    const incrementMagic = () => {
        magicCount++;
    };
    const incrementStealth = () => {
        stealthCount++;
    };

    const scoreAnswer = (scoreType) => {
        if (scoreType === 'combat') incrementCombat();
        if (scoreType === 'magic') incrementMagic();
        if (scoreType === 'stealth') incrementStealth();
    };

    const recordAnswer = (answerIndex) => {
        const question = quizQuestions[currentQuestion - 1];
        const answer = question.answers[answerIndex];

        recordedAnswers.push({
            questionNumber: currentQuestion,
            prompt: question.prompt,
            choice: answer.label,
            answerText: answer.text,
            score: answer.score
        });

        scoreAnswer(answer.score);
        persistQuizState();
        nextQuestion();
    };

    const renderQuestion = () => {
        const question = quizQuestions[currentQuestion - 1];
        $('#question-count').text('Question ' + currentQuestion + ' of ' + quizQuestions.length);
        $('#question-prompt').text(question.prompt);

        const buttonsHtml = question.answers.map((answer, index) => {
            return '<button onclick="recordAnswer(' + index + ')"><span class="answer-label">' + answer.label + '.</span> ' + escapeHtml(answer.text) + '</button>';
        }).join('');

        $('#answer-buttons').html(buttonsHtml);
    };

    const nextQuestion = () => {
        if (currentQuestion === quizQuestions.length) {
            displayResult();
            return;
        }

        currentQuestion++;
        renderQuestion();
        new Audio('audio-files/' + (4 + currentQuestion) + '-quiz-' + currentQuestion + '.mp3').play();
    };

    const playAudio = (fileName, button1, button2, timeout) => {
        new Audio(fileName).play();
        $(button1).hide();

        setTimeout(() => {
            $(button2).show();
        }, timeout);
    };

    const playAudio1 = () => {
        const themeAudio = new Audio('audio-files/theme.mp3');
        themeAudio.loop = true;
        themeAudio.volume = 0.15;
        themeAudio.play();

        $('#audio-message').hide();
        playAudio('audio-files/1-boat-guard.mp3', '#button-1', '#button-2', 3000);
    };

    const playAudio2 = () => {
        playAudio('audio-files/2-dock-guard.mp3', '#button-2', '#button-3', 3000);
    };

    const playAudio3 = () => {
        playAudio('audio-files/3-dock-guard.mp3', '#button-3', '#button-4', 5000);
    };

    const playAudio4 = () => {
        playAudio('audio-files/4-quiz-welcome.mp3', '#button-4', '#button-5', 9000);
    };

    const playAudio5 = () => {
        renderQuestion();
        playAudio('audio-files/5-quiz-1.mp3', '#button-5', '#quiz-question', 0);
    };

    let classKey;
    let className;
    const displayResult = () => {
        if (combatCount >= 7) {
            className = 'Warrior';
        } else if (magicCount >= 7) {
            className = 'Mage';
        } else if (stealthCount >= 7) {
            className = 'Thief';
        } else if (combatCount === 4) {
            className = 'Rogue';
        } else {
            classKey = String(combatCount) + String(magicCount) + String(stealthCount);
            className = quizResultLookup[classKey];
        }

        persistQuizState();

        $('#class-name').text(className || 'Unresolved');

        if (classInfo[className]) {
            $('#class-image').attr('src', classInfo[className].image).show();
            $('#class-description').text(classInfo[className].description);
        } else {
            $('#class-image').hide();
            $('#class-description').text('The extra answer options changed the score pattern in a way that is not covered by the original lookup table yet.');
        }

        $('#quiz-question').hide();
        $('#quiz-result').show();
    };

    const restartQuiz = () => {
        combatCount = 0;
        magicCount = 0;
        stealthCount = 0;
        currentQuestion = 1;
        recordedAnswers = [];
        resetStoredQuizState();

        $('#quiz-result').hide();
        $('#quiz-question').show();
        playAudio5();
    };

    const escapeHtml = (unsafe) => {
        return unsafe
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    };

    const quizResultLookup = {
        "226": "Acrobat",
        "316": "Agent",
        "550": "Archer",
        "541": "Archer",
        "532": "Archer",
        "514": "Archer",
        "505": "Archer",
        "136": "Assassin",
        "631": "Barbarian",
        "163": "Battlemage",
        "064": "Battlemage",
        "613": "Crusader",
        "361": "Healer",
        "640": "Knight",
        "622": "Knight",
        "604": "Knight",
        "235": "Monk",
        "325": "Pilgrim",
        "523": "Scout",
        "262": "Sorcerer",
        "343": "Spellsword",
        "244": "Spellsword",
        "145": "Spellsword",
        "046": "Spellsword",
        "334": "Warrior",
        "352": "Witchhunter",
        "253": "Witchhunter",
        "154": "Witchhunter",
        "055": "Witchhunter"
    };

    const classInfo = {
        "Acrobat": {
            "image": "image-files/Acrobat.jpg",
            "description": "Acrobat is a polite euphemism for agile burglars and second-story men. These thieves avoid detection by stealth, and rely on mobility and cunning to avoid capture."
        },
        "Agent": {
            "image": "image-files/Agent.jpg",
            "description": "Agents are operatives skilled in deception and avoidance, but trained in self-defense and the use of deadly force. Self-reliant and independent, agents devote themselves to personal goals, or to various patrons or causes."
        },
        "Archer": {
            "image": "image-files/Archer.jpg",
            "description": "Archers are fighters specializing in long-range combat and rapid movement. Opponents are kept at distance by ranged weapons and swift maneuver, and engaged in melee with sword and shield after the enemy is wounded and weary."
        },
        "Assassin": {
            "image": "image-files/Assassin.jpg",
            "description": "Assassins are killers who rely on stealth and mobility to approach victims undetected. Execution is with ranged weapons or with short blades for close work. Assassins include ruthless murderers and principled agents of noble causes."
        },
        "Barbarian": {
            "image": "image-files/Barbarian.jpg",
            "description": "Barbarians are the proud, savage warrior elite of the plains nomads, mountain tribes, and sea reavers. They tend to be brutal and direct, lacking civilized graces, but they glory in heroic feats, and excel in fierce, frenzied single combat."
        },
        "Battlemage": {
            "image": "image-files/Battlemage.jpg",
            "description": "Battlemages are wizard-warriors, trained in both lethal spellcasting and heavily armored combat. They sacrifice mobility and versatility for the ability to supplement melee and ranged attacks with elemental damage and summoned creatures."
        },
        "Crusader": {
            "image": "image-files/Crusader.jpg",
            "description": "Any heavily armored warrior with spellcasting powers and a good cause may call himself a Crusader. Crusaders do well by doing good. They hunt monsters and villains, making themselves rich by plunder as they rid the world of evil."
        },
        "Healer": {
            "image": "image-files/Healer.jpg",
            "description": "Healers are spellcasters who swear solemn oaths to heal the afflicted and cure the diseased. When threatened, they defend themselves with reason and disabling attacks and magic, relying on deadly force only in extremity."
        },
        "Knight": {
            "image": "image-files/Knight.jpg",
            "description": "Of noble birth, or distinguished in battle or tourney, knights are civilized warriors, schooled in letters and courtesy, governed by the codes of chivalry. In addition to the arts of war, knights study the lore of healing and enchantment."
        },
        "Mage": {
            "image": "image-files/Mage.jpg",
            "description": "Most mages claim to study magic for its intellectual rewards, but they also often profit from its practical applications. Varying widely in temperament and motivation, mages share but one thing in common - an avid love of spellcasting."
        },
        "Monk": {
            "image": "image-files/Monk.jpg",
            "description": "Monks are students of the ancient martial arts of hand-to-hand combat and unarmored self defense. Monks avoid detection by stealth, mobility, and agility, and are skilled with a variety of ranged and close-combat weapons."
        },
        "Pilgrim": {
            "image": "image-files/Pilgrim.jpg",
            "description": "Pilgrims are travellers, seekers of truth and enlightenment. They fortify themselves for road and wilderness with arms, armor, and magic, and through wide experience of the world, they become shrewd in commerce and persuasion."
        },
        "Rogue": {
            "image": "image-files/Rogue.jpg",
            "description": "Rogues are adventurers and opportunists with a gift for getting in and out of trouble. Relying variously on charm and dash, blades and business sense, they thrive on conflict and misfortune, trusting to their luck and cunning to survive."
        },
        "Scout": {
            "image": "image-files/Scout.jpg",
            "description": "Scouts rely on stealth to survey routes and opponents, using ranged weapons and skirmish tactics when forced to fight. By contrast with barbarians, in combat scouts tend to be cautious and methodical, rather than impulsive."
        },
        "Sorcerer": {
            "image": "image-files/Sorcerer.jpg",
            "description": "Though spellcasters by vocation, sorcerers rely most on summonings and enchantments. They are greedy for magic scrolls, rings, armor and weapons, and commanding undead and Daedric servants gratifies their egos."
        },
        "Spellsword": {
            "image": "image-files/Spellsword.jpg",
            "description": "Spellswords are spellcasting specialists trained to support Imperial troops in skirmish and in battle. Veteran spellswords are prized as mercenaries, and well-suited for careers as adventurers and soldiers-of-fortune."
        },
        "Thief": {
            "image": "image-files/Thief.jpg",
            "description": "Thieves are pickpockets and pilferers. Unlike robbers, who kill and loot, thieves typically choose stealth and subterfuge over violence, and often entertain romantic notions of their charm and cleverness in their acquisitive activities."
        },
        "Warrior": {
            "image": "image-files/Warrior.jpg",
            "description": "Warriors are the professional men-at-arms, soldiers, mercenaries, and adventurers of the Empire, trained with various weapons and armor styles, conditioned by long marches, and hardened by ambush, skirmish, and battle."
        },
        "Witchhunter": {
            "image": "image-files/Witchhunter.jpg",
            "description": "Witchhunters are dedicated to rooting out and destroying the perverted practices of dark cults and profane sorcery. They train for martial, magical, and stealthy war against vampires, witches, warlocks, and necromancers."
        }
    };
</script>
</html>
